<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .password-card {
            max-width: 450px;
            margin: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #2c5364;
            box-shadow: 0 0 6px rgba(44,83,100,0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: #2c5364;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: #203a43;
        }

        .message-success {
            background: #e6f4ea;
            color: #1b5e20;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .message-error {
            background: #fdecea;
            color: #c62828;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .back-link {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #2c5364;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container password-card">

    <h1 style="color:#2c5364;">🔐 Change Password</h1>

    {% if error %}
        <div class="message-error">
            {{ error }}
        </div>
    {% endif %}

    {% if success %}
        <div class="message-success">
            {{ success }}
        </div>
    {% endif %}

    <form method="POST">

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password" required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required>
        </div>

        <button type="submit" class="submit-btn">
            Update Password
        </button>

    </form>

    <a href="{{ url_for('dashboard') }}" class="back-link">
        ← Back to Dashboard
    </a>

</div>

<div class="footer">
    © 2026 Heart Disease Clinical AI System | Developed by Mohammed Raza
</div>

</body>
</html>
