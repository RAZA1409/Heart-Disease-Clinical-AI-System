<!DOCTYPE html>
<html>
<head>
<title>Patient History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
}

/* MAIN CONTAINER */
.container{
width:90%;
max-width:1200px;
margin:50px auto;
padding:35px;
border-radius:22px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(18px);

box-shadow:0 20px 60px rgba(0,0,0,0.4);
border:1px solid rgba(255,255,255,0.15);
}

/* TITLE */
h1{
margin-bottom:25px;
font-size:28px;
font-weight:700;
color:#38bdf8;
}

/* SEARCH + FILTER */
.controls{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:15px;
margin-bottom:30px;
}

.search{
padding:12px 16px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.1);
color:white;
width:260px;
}

.select{
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
border:none;
}

/* TABLE */
.table{
width:100%;
border-collapse:separate;
border-spacing:0 12px;
}

th{
color:#cbd5f5;
font-size:14px;
text-align:left;
padding:10px;
}

tr{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(8px);
transition:.3s;
cursor:pointer;
}

tr:hover{
transform:scale(1.01);
background:rgba(255,255,255,0.12);
box-shadow: 0 0 8px #38bdf8;
}

td{
padding:16px 12px;
color:white;
}

/* BADGES */
.badge{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.low{background:#16a34a}
.moderate{background:#f97316}
.high{background:#dc2626}

/* BUTTON */
.delete-btn{
background:#ef4444;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

.delete-btn:hover{
transform:scale(1.1);
box-shadow: 0 0 8px #f85838;
}

/* BACK BUTTON */
.back{
margin-top:25px;
display:inline-block;
padding:10px 18px;
border-radius:10px;
background:#1e293b;
color:white;
text-decoration:none;
transition:.3s;
}

.back:hover{
transform:translateY(-3px);
box-shadow: 0 0 8px #38bdf8;
}

.select option {
    background: #1e293b;
    color: white;
}

.select:hover {
    box-shadow: 0 0 8px #38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>📁 Patient History Records</h1>

<div class="controls">

<input type="text" id="search" class="search" placeholder="Search by ID or Name">

<select id="filter" class="select">
<option value="">All Risk Levels</option>
<option value="LOW">Low</option>
<option value="MODERATE">Moderate</option>
<option value="HIGH">High</option>
</select>

</div>

<table class="table" id="table">

<thead>
<tr>
<th>Patient ID</th>
<th>Name</th>
<th>Age</th>
<th>Risk</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for p in patients %}
<tr onclick="window.location='/patient/{{ p.patient_id }}'">

<td>{{ p.patient_id }}</td>
<td>{{ p.patient_name }}</td>
<td>{{ p.age }}</td>

<td>
<span class="badge 
{% if p.risk_level == 'LOW' %}low
{% elif p.risk_level == 'MODERATE' %}moderate
{% else %}high{% endif %}">
{{ p.risk_level }}
</span>
</td>

<td>{{ p.timestamp }}</td>

<td>
<form method="POST" action="/delete/{{ p.patient_id }}" onsubmit="event.stopPropagation();">
<button type="submit" class="delete-btn" onclick="event.stopPropagation();">
Delete
</button>
</form>
</td>

</tr>
{% endfor %}

</tbody>

</table>

<a href="/dashboard" class="back">← Back to Dashboard</a>

</div>

<script>

/* SEARCH */
document.getElementById("search").addEventListener("keyup", function(){
let value = this.value.toLowerCase();
let rows = document.querySelectorAll("#table tbody tr");

rows.forEach(row=>{
row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
});
});

/* FILTER */
document.getElementById("filter").addEventListener("change", function(){
let value = this.value;
let rows = document.querySelectorAll("#table tbody tr");

rows.forEach(row=>{
let risk = row.children[3].innerText.trim();
row.style.display = (value === "" || risk === value) ? "" : "none";
});
});

</script>

</body>
</html>
