<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Clinical Assessment</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 14px;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #2c5364;
            box-shadow: 0 0 5px rgba(44,83,100,0.4);
        }

        .submit-btn {
            margin-top: 30px;
            padding: 12px;
            background: #2c5364;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .submit-btn:hover {
            background: #203a43;
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #2c5364;
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container">

    <h1 style="color:#2c5364;">🫀 Heart Disease Clinical Assessment</h1>

    <form action="/predict" method="POST">

        <h3 style="margin-top:25px;">Patient Information</h3>

        <div class="form-grid">
            <div class="form-group">
                <label>Patient Name</label>
                <input type="text" name="patient_name" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <label>Sex</label>
                <select name="sex">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>
        </div>

        <h3 style="margin-top:30px;">Clinical Parameters</h3>

        <div class="form-grid">

            <div class="form-group">
                <label>Chest Pain Type</label>
                <input type="number" name="cp" required>
            </div>

            <div class="form-group">
                <label>Resting BP</label>
                <input type="number" name="trestbps" required>
            </div>

            <div class="form-group">
                <label>Cholesterol</label>
                <input type="number" name="chol" required>
            </div>

            <div class="form-group">
                <label>FBS over 120 (1/0)</label>
                <input type="number" name="fbs" required>
            </div>

            <div class="form-group">
                <label>EKG Results (0–2)</label>
                <input type="number" name="restecg" required>
            </div>

            <div class="form-group">
                <label>Max Heart Rate</label>
                <input type="number" name="thalach" required>
            </div>

            <div class="form-group">
                <label>Exercise Angina (1/0)</label>
                <input type="number" name="exang" required>
            </div>

            <div class="form-group">
                <label>ST Depression</label>
                <input type="number" step="any" name="oldpeak" required>
            </div>

            <div class="form-group">
                <label>Slope (1–3)</label>
                <input type="number" name="slope" required>
            </div>

            <div class="form-group">
                <label>Number of Vessels</label>
                <input type="number" name="ca" required>
            </div>

            <div class="form-group">
                <label>Thallium (3,6,7)</label>
                <input type="number" name="thal" required>
            </div>

        </div>

        <button type="submit" class="submit-btn">Analyze Patient</button>

    </form>

    <a href="{{ url_for('dashboard') }}" class="back-link">← Back to Dashboard</a>

</div>

<div class="footer">
    © 2026 Heart Disease Clinical AI System | Developed by Mohammed Raza
</div>

</body>
</html>
