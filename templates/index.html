<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Clinical Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1 style="color:#315c6e;">🫀 Heart Disease Clinical Assessment</h1>

    <form action="/predict" method="POST">

        <h3 style="margin-top:25px;">Patient Information</h3>

        <div class="form-grid">

            <div class="form-group">
                <label>Patient Name</label>
                <input type="text" name="patient_name" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" required>
            </div>

            <div class="form-group">
                <label>Sex</label>
                <select name="sex">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

        </div>

        <h3 style="margin-top:30px;">Clinical Parameters</h3>

        <div class="form-grid">

            <div class="form-group">
                <label>Chest Pain Type</label>
                <select name="cp">
                    <option>Typical Angina</option>
                    <option>Atypical Angina</option>
                    <option>Non-Anginal Pain</option>
                    <option>Asymptomatic</option>
                </select>
            </div>

            <div class="form-group">
                <label>Resting Blood Pressure</label>
                <input type="number" name="trestbps" required>
            </div>

            <div class="form-group">
                <label>Serum Cholesterol</label>
                <input type="number" name="chol" required>
            </div>

            <div class="form-group">
                <label>Fasting Blood Sugar > 120 mg/dl</label>
                <select name="fbs">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Resting ECG Results</label>
                <select name="restecg">
                    <option>Normal</option>
                    <option>ST-T Abnormality</option>
                    <option>Left Ventricular Hypertrophy</option>
                </select>
            </div>

            <div class="form-group">
                <label>Maximum Heart Rate Achieved</label>
                <input type="number" name="thalach" required>
            </div>

            <div class="form-group">
                <label>Exercise Induced Angina</label>
                <select name="exang">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>ST Depression</label>
                <input type="number" step="any" name="oldpeak" required>
            </div>

            <div class="form-group">
                <label>Slope of Peak Exercise ST</label>
                <select name="slope">
                    <option>Upsloping</option>
                    <option>Flat</option>
                    <option>Downsloping</option>
                </select>
            </div>

            <div class="form-group">
                <label>Number of Major Vessels</label>
                <input type="number" name="ca" required>
            </div>

            <div class="form-group">
                <label>Thalassemia</label>
                <select name="thal">
                    <option>Normal</option>
                    <option>Fixed Defect</option>
                    <option>Reversible Defect</option>
                </select>
            </div>

        </div>

        <button type="submit" class="submit-btn">Analyze Patient</button>

    </form>

</div>

<div class="footer">
    © 2026 Heart Disease Clinical AI System | Developed by Mohammed Raza
</div>

</body>
</html>
