<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Clinical Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Heart Disease Clinical Assessment</h1>

    <form action="/predict" method="POST">

        <h3>Patient Information</h3>
        <input type="text" name="patient_name" placeholder="Patient Name" required>

        <h3>Clinical Parameters</h3>

        <input type="number" step="any" name="age" placeholder="Age" required>
        <select name="sex">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select>

        <input type="number" step="any" name="cp" placeholder="Chest Pain Type (1-4)" required>
        <input type="number" step="any" name="trestbps" placeholder="Resting BP" required>
        <input type="number" step="any" name="chol" placeholder="Cholesterol" required>
        <input type="number" step="any" name="fbs" placeholder="FBS over 120 (1/0)" required>
        <input type="number" step="any" name="restecg" placeholder="EKG Results (0-2)" required>
        <input type="number" step="any" name="thalach" placeholder="Max Heart Rate" required>
        <input type="number" step="any" name="exang" placeholder="Exercise Angina (1/0)" required>
        <input type="number" step="any" name="oldpeak" placeholder="ST Depression" required>
        <input type="number" step="any" name="slope" placeholder="Slope (1-3)" required>
        <input type="number" step="any" name="ca" placeholder="Number of Vessels (0-3)" required>
        <input type="number" step="any" name="thal" placeholder="Thallium (3,6,7)" required>

        <button type="submit">Analyze Patient</button>

    </form>
</div>
<footer>
    <p>© 2026 Heart Disease Clinical AI System | Developed by Mohammed Raza</p>
</footer>
</body>
</html>
