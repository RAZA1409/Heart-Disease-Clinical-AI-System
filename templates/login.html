<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Login | Clinical AI System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c92d2);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
overflow:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* Floating Glow Circles */
body::before,
body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,rgba(255,255,255,0.15),transparent 70%);
border-radius:50%;
animation:float 10s ease-in-out infinite alternate;
}

body::before{
top:-150px;
left:-150px;
}

body::after{
bottom:-150px;
right:-150px;
animation-delay:3s;
}

@keyframes float{
from{transform:translateY(0px)}
to{transform:translateY(40px)}
}

/* LOGIN CARD */
.login-card{
width:430px;
padding:50px 40px;
border-radius:22px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);
box-shadow:0 25px 60px rgba(0,0,0,0.5);
color:white;
position:relative;
z-index:2;
}

.login-card h2{
text-align:center;
font-size:26px;
margin-bottom:6px;
font-weight:700;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:35px;
}

/* FLOATING INPUT */
.input-group{
position:relative;
margin-bottom:28px;
}

.input-group input{
width:100%;
padding:14px 14px;
border-radius:10px;
border:none;
outline:none;
background:rgba(255,255,255,0.15);
color:white;
font-size:14px;
}

.input-group label{
position:absolute;
top:50%;
left:14px;
transform:translateY(-50%);
font-size:13px;
color:rgba(255,255,255,0.7);
pointer-events:none;
transition:0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
left:10px;
background:#2563eb;
padding:2px 6px;
border-radius:6px;
font-size:11px;
color:white;
}

/* SHOW PASSWORD */
.toggle-password{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:12px;
opacity:0.8;
}

/* OPTIONS */
.options{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
font-size:12px;
}

.options label{
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

.options a{
color:#93c5fd;
text-decoration:none;
}

.options a:hover{
text-decoration:underline;
}

/* LOGIN BUTTON */
.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#2563eb,#9333ea);
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:0.3s;
box-shadow:0 8px 25px rgba(0,0,0,0.4);
position:relative;
}

.login-btn:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

/* LOADING SPINNER */
.spinner{
display:none;
width:18px;
height:18px;
border:2px solid rgba(255,255,255,0.4);
border-top:2px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

/* ERROR */
.error{
margin-top:18px;
padding:10px;
background:rgba(239,68,68,0.25);
border-left:4px solid #ef4444;
border-radius:8px;
font-size:13px;
}

/* FOOTER */
.footer{
margin-top:30px;
text-align:center;
font-size:12px;
opacity:0.7;
}

.secure-badge{
margin-top:15px;
text-align:center;
font-size:11px;
opacity:0.7;
}

</style>
</head>

<body>

<div class="login-card">

<h2>🫀 Clinical AI System</h2>
<div class="subtitle">Doctor Authentication Portal</div>

<form method="POST" onsubmit="showLoading()">

<div class="input-group">
<input type="text" name="username" required placeholder=" " 
value="{{ remembered_user if remembered_user else '' }}">
<label>Username</label>
</div>

<div class="input-group">
<input type="password" id="password" name="password" required placeholder=" ">
<label>Password</label>
<span class="toggle-password" onclick="togglePassword()">Show</span>
</div>

<div class="options">
<label>
<input type="checkbox" name="remember">
Remember Me
</label>

<a href="{{ url_for('forgot_password') }}">Forgot Password?</a>
</div>

<button type="submit" class="login-btn" id="loginButton">
<span id="loginText">Login to Dashboard</span>
<div class="spinner" id="spinner"></div>
</button>

{% if error %}
<div class="error">
⚠ {{ error }}
</div>
{% endif %}

</form>

<div class="secure-badge">
🔒 256-bit Encryption • Secure Medical Access
</div>

<div class="footer">
Heart Disease Clinical AI System<br>
Enterprise Clinical Intelligence Platform
</div>

</div>

<script>
function togglePassword(){
const password=document.getElementById("password");
if(password.type==="password"){
password.type="text";
}else{
password.type="password";
}
}

function showLoading(){
document.getElementById("loginText").style.display="none";
document.getElementById("spinner").style.display="block";
}
</script>

</body>
</html>
