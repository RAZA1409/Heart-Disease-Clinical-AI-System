<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Clinical Assessment Result</h1>

    <div class="result-card" style="border-color: {{ color }};">
        <h2>Patient Name: {{ patient_name }}</h2>
        <h3>Patient ID: {{ patient_id }}</h3>

        <p><strong>Prediction:</strong> {{ prediction }}</p>
        <p><strong>Risk Probability:</strong> {{ probability }}%</p>
        <p>
    <strong>Risk Level:</strong>
    <span class="
        {% if risk_level == 'LOW' %}
            risk-low
        {% elif risk_level == 'MODERATE' %}
            risk-moderate
        {% else %}
            risk-high
        {% endif %}
    ">
        {{ risk_level }}
    </span>
</p>
    </div>

    <a href="/">Back to Assessment</a>
    <br><br>
    <a href="/history">View Patient History</a>
</div>

</body>
</html>
